<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Asian Tour Champions Database</title>
<style>
* {margin:0; padding:0; box-sizing:border-box}
body {font-family:system-ui,sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; padding:20px}
.container {max-width:1600px; margin:0 auto; background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,0.3); position:relative}
.header {background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%); color:white; padding:50px 40px; text-align:center; border-radius:20px 20px 0 0}
.header h1 {font-size:2.5em; margin-bottom:10px}
.header p {font-size:1.2em; opacity:0.9}
.tabs {display:flex; background:#f8f9fa; border-bottom:2px solid #dee2e6; overflow-x:auto}
.tab {padding:20px 30px; cursor:pointer; border:none; background:none; font-size:1.1em; font-weight:600; color:#495057; border-bottom:3px solid transparent}
.tab:hover {background:#e9ecef}
.tab.active {background:white; color:#1e3c72; border-bottom:3px solid #1e3c72}
.content {padding:30px}
.tab-content {display:none}
.tab-content.active {display:block}
.search-box {width:100%; padding:15px; font-size:1.1em; border:2px solid #dee2e6; border-radius:10px; margin-bottom:20px}
table {width:100%; border-collapse:collapse}
th {background:#1e3c72; color:white; padding:15px; text-align:left; position:sticky; top:0}
td {padding:12px 15px; border-bottom:1px solid #dee2e6}
tr:hover {background:#f8f9ff}
.player-name {color:#1e3c72; font-weight:700; cursor:pointer}
.player-name:hover {color:#667eea; text-decoration:underline}
.notification {position:fixed; top:20px; right:20px; background:#28a745; color:white; padding:15px 25px; border-radius:8px; box-shadow:0 4px 6px rgba(0,0,0,0.2); display:none; z-index:2000}
.edit-link {background:#007bff; color:white; padding:10px 20px; border-radius:5px; text-decoration:none; margin:20px 0; display:inline-block; font-weight:600}
.stats-grid {display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:20px; margin-top:20px}
.stat-card {background:#f8f9fa; padding:20px; border-radius:10px; border-left:4px solid #667eea}
.stat-card h3 {color:#667eea; margin-bottom:10px}
.stat-card p {font-size:1.5em; font-weight:700; color:#1e3c72}
.new-badge {background:#28a745; color:white; padding:3px 8px; border-radius:3px; font-size:0.8em; margin-left:5px}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>🏆 Asian Tour Champions Database</h1>
<p>📊 Historical Data + Live Google Sheets | <span id="count">Loading...</span> Tournaments</p>
<a href="https://docs.google.com/spreadsheets/d/1mtO6pB3MvEZHoojh17SSMMxvEOLZLUgE580UXR9tGu4/edit?usp=sharing" target="_blank" class="edit-link">✏️ Add New Entry in Google Sheets</a>
</div>

<div class="tabs">
<button class="tab active" onclick="showTab('all')">📋 All Tournaments</button>
<button class="tab" onclick="showTab('players')">👤 Players</button>
<button class="tab" onclick="showTab('statistics')">📊 Statistics</button>
</div>

<div class="content">

<div id="all" class="tab-content active">
<input type="text" id="searchAll" class="search-box" placeholder="🔍 Search tournaments..." onkeyup="filterTournaments()">
<table><thead><tr><th>Year</th><th>Date</th><th>Tournament</th><th>Winner</th></tr></thead>
<tbody id="tbody"></tbody></table>
</div>

<div id="players" class="tab-content">
<table><thead><tr><th style="text-align:center">Rank</th><th>Player Name</th><th style="text-align:center">Wins</th></tr></thead>
<tbody id="playersBody"></tbody></table>
</div>

<div id="statistics" class="tab-content">
<h2>Tournament Statistics</h2>
<div class="stats-grid" id="stats"></div>
</div>

</div>
</div>

<div class="notification" id="notification"></div>

<script>
// Historical data (1995-2026)
const HISTORICAL_DATA = [
[1995, "25 Jun", "Asian PGA International", "Park Nam-sin"],
[1995, "2 Jul", "Canlubang Classic", "Carlos Espinosa"],
[1995, "30 Jul", "Tournament Players Championship", "Lin Keng-chi"],
[1995, "13 Aug", "Volvo Masters of Thailand", "Zhang Lianwei"],
[1995, "27 Aug", "Yokohama Singapore PGA Championship", "Lin Keng-chi"],
[1995, "3 Sep", "Passport Open", "Vijay Singh"],
[1995, "1 Oct", "Langkawi Open", "Boonchu Ruangkit"],
[1995, "8 Oct", "Gadgil Western Dubai Creek Open", "Robert Willis"],
[1995, "15 Oct", "Merlion Masters", "Nico van Rensburg"],
[1995, "22 Oct", "Samsung Masters", "Lin Keng-chi"],
[1995, "29 Oct", "Royal Perak Classic", "Gerry Norquist"],
[1995, "20 Nov", "Kenmore Pakistan Masters", "Kwon Young-suk"],
[1995, "27 Nov", "Gadgil Western Masters", "Gaurav Ghei"],
[1995, "10 Dec", "Gadgil Western Vietnam Open", "Clay Devers"],
[1995, "17 Dec", "Philippine Classic", "Jeev Milkha Singh"],
[2026, "8-Feb", "Philippine Golf Championship presented by Philippine Sports Commission", "Wooyoung Cho"],
[2026, "1-Mar", "105th New Zealand Open presented by Millbrook Resort", "Daniel Hillier"],
[2026, "5-Apr", "International Series Japan", "Travis Smyth"],
[2026, "26-Apr", "Singapore Open presented by The Business Times", "Jeongwoo Ham"],
[2026, "3-May", "The 45th GS Caltex Maekyung Open Golf Championship", "Minhyuk Song"]
];

let data = [];
let players = {};
let newEntryCount = 0;

async function loadData() {
    try {
        // Start with historical data
        data = JSON.parse(JSON.stringify(HISTORICAL_DATA));
        
        // Load new entries from Google Sheet
        const sheetId = '1mtO6pB3MvEZHoojh17SSMMxvEOLZLUgE580UXR9tGu4';
        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv`;
        const response = await fetch(url);
        const csv = await response.text();
        
        const lines = csv.trim().split('\n');
        newEntryCount = 0;
        
        // Skip header, add new entries
        for (let i = 1; i < lines.length; i++) {
            const cols = parseCSV(lines[i]);
            if (cols.length >= 4 && cols[0].trim()) {
                data.push([
                    parseInt(cols[0]) || cols[0],
                    cols[1].trim(),
                    cols[2].trim(),
                    cols[3].trim(),
                    true // Mark as NEW entry
                ]);
                newEntryCount++;
            }
        }
        
        // Sort by year, then date
        data.sort((a, b) => {
            if (a[0] !== b[0]) return a[0] - b[0];
            return a[1].localeCompare(b[1]);
        });
        
        calcPlayers();
        render();
        showNotification(`✅ Loaded ${HISTORICAL_DATA.length} historical + ${newEntryCount} new entries`);
        console.log('Loaded:', data.length, 'total tournaments');
    } catch(e) {
        console.error('Error:', e);
        data = JSON.parse(JSON.stringify(HISTORICAL_DATA));
        calcPlayers();
        render();
        showNotification('⚠️ Using historical data (Google Sheets unavailable)');
    }
}

function parseCSV(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    
    for (let i = 0; i < line.length; i++) {
        const char = line[i];
        if (char === '"') {
            inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
            result.push(current.trim().replace(/^"|"$/g, ''));
            current = '';
        } else {
            current += char;
        }
    }
    result.push(current.trim().replace(/^"|"$/g, ''));
    return result;
}

function calcPlayers() {
    players = {};
    data.forEach(t => {
        if (t[3]) {
            if (!players[t[3]]) players[t[3]] = 0;
            players[t[3]]++;
        }
    });
}

function render() {
    renderTournaments();
    renderPlayers();
    renderStats();
    document.getElementById('count').textContent = data.length;
}

function renderTournaments() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    data.forEach(t => {
        const row = tbody.insertRow();
        const badge = t[4] ? '<span class="new-badge">NEW</span>' : '';
        row.innerHTML = `<td>${t[0]}</td><td>${t[1]}</td><td>${t[2]}</td><td><span class="player-name">${t[3]}</span>${badge}</td>`;
    });
}

function renderPlayers() {
    const pb = document.getElementById('playersBody');
    pb.innerHTML = '';
    const sorted = Object.entries(players).sort((a,b) => b[1] - a[1]);
    sorted.forEach(([p,w],i) => {
        const row = pb.insertRow();
        row.innerHTML = `<td style="text-align:center;font-size:1.2em">#${i+1}</td><td><span class="player-name">${p}</span></td><td style="text-align:center;font-weight:700;color:#667eea">${w}</td>`;
    });
}

function renderStats() {
    const stats = document.getElementById('stats');
    const years = data.map(t => t[0]);
    const minYear = Math.min(...years);
    const maxYear = Math.max(...years);
    const topWinner = Object.entries(players).sort((a,b) => b[1] - a[1])[0];
    
    stats.innerHTML = `
        <div class="stat-card">
            <h3>📊 Total Tournaments</h3>
            <p>${data.length}</p>
        </div>
        <div class="stat-card">
            <h3>👥 Total Winners</h3>
            <p>${Object.keys(players).length}</p>
        </div>
        <div class="stat-card">
            <h3>📅 Year Range</h3>
            <p>${minYear} - ${maxYear}</p>
        </div>
        <div class="stat-card">
            <h3>🏆 Top Winner</h3>
            <p>${topWinner ? topWinner[0] : 'N/A'}</p>
        </div>
        <div class="stat-card">
            <h3>✨ New Entries</h3>
            <p>${newEntryCount}</p>
        </div>
    `;
}

function showTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    document.querySelector(`[onclick="showTab('${tabName}')"]`).classList.add('active');
}

function filterTournaments() {
    const search = document.getElementById('searchAll').value.toLowerCase();
    const rows = document.getElementById('tbody').getElementsByTagName('tr');
    for (let row of rows) {
        const text = row.textContent.toLowerCase();
        row.style.display = text.includes(search) ? '' : 'none';
    }
}

function showNotification(msg) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.display = 'block';
    setTimeout(() => { n.style.display = 'none'; }, 4000);
}

// Load on startup
loadData();

// Auto-refresh every 30 seconds
setInterval(loadData, 30000);
</script>

</body>
</html>
